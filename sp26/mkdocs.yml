    - 'App. D: RISC-V Crash Course': 'appendix/riscv.md'
    - 'App. E: RISC-V 32 工具链指南': 'appendix/rv32_toolchain.md'
    - 'App. F: 静态单赋值 SSA': 'appendix/ssa.md'
    - 'App. G: Accipit IR 规范': 'appendix/accipit-spec.md'
    - 'App. H: VSCode 调试指南': 'appendix/vscode.md'

copyright: Copyright &copy; 2023 - 2026 ZJU Compiler Group


theme: 
  name: material
  custom_dir: overrides
  favicon: 'assets/image/zjueagle.png'
  logo: 'assets/image/zjueagle_white.svg'
  features:
    - content.tabs.link
    - content.code.copy
    # - content.action.edit
    - navigation.tracking
    - navigation.top
    # - navigation.tabs
    - navigation.footer
    - navigation.indexes
    - navigation.sections

  theme:
  palette:

    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - md_in_html
  - def_list
  - pymdownx.betterem # better emphasize
  - pymdownx.tabbed:
      alternate_style: true 
  - toc:
      permalink: true
      permalink_title: Anchor link to this section for reference
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - git-revision-date-localized
  - meta-manager

extra_javascript:
  - katex/katex.js
  - katex/katex.min.js
  - katex/auto-render.min.js

extra_css:
  - katex/katex.min.css