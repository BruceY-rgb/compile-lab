      - 'Accipit IR': 'lab/lab3/accipit.md'
    - 'Lab 4: 目标代码生成': 'lab/lab4.md'

  - Bonus:
    - 'Bonus 0: 贡献优质测试用例': 'bonus/contribute.md'
    - 'Bonus 1: Lexer & Parser, DIY!': 'bonus/rdparser.md'
